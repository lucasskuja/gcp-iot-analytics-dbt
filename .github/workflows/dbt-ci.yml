name: dbt-ci

on:
  pull_request:
    paths:
      - "composer/dags/gcp_iot_analytics_dbt/dbt_project/**"
      - "composer/dags/gcp_iot_analytics_dbt/iot_energy_pipeline.py"
      - "composer/requirements-composer.txt"
  push:
    branches: [main]
    paths:
      - "composer/dags/gcp_iot_analytics_dbt/dbt_project/**"
      - "composer/dags/gcp_iot_analytics_dbt/iot_energy_pipeline.py"
      - "composer/requirements-composer.txt"
  workflow_dispatch:

jobs:
  dbt-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: composer/dags/gcp_iot_analytics_dbt/dbt_project
    env:
      GCP_PROJECT_ID: demo-project
      GCP_REGION: us-central1
      BQ_DATASET_RAW: raw_iot_energy
      BQ_DATASET_ANALYTICS: analytics_iot_energy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.8.2

      - name: Install packages
        run: dbt deps --profiles-dir .

      - name: Validate project structure
        run: dbt parse --profiles-dir . --target ci

      - name: List project nodes
        run: dbt ls --profiles-dir . --target ci

      - name: Compile project
        run: dbt compile --profiles-dir . --target ci

      - name: Generate docs metadata
        run: dbt docs generate --profiles-dir . --target ci --empty-catalog
